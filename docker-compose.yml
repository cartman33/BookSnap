services:
  mysql:
    image: mysql:8.0
    container_name: booksnap-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booksnap}
      MYSQL_USER: ${MYSQL_USER:-booksnap}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booksnap}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - booksnap_mysql_data:/var/lib/mysql

volumes:
  booksnap_mysql_data:
