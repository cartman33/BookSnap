server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: booksnap-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/booksnap?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:booksnap}
    password: ${DB_PASSWORD:booksnap}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect # MySQL을 쓴다고 강제 지정
    hibernate:
      ddl-auto: update # DB 테이블 자동 생성
    show-sql: true # 콘솔에 SQL문 출력 (개발할 때 매우 유용함)

management:
  endpoints:
    web:
      exposure:
        include: health,info

booksnap:
  jwt:
    issuer: ${JWT_ISSUER:booksnap}
    secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600} # 14d
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
